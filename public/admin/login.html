<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | KI News</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body class="admin-body auth-page">
  <main class="auth-wrap">
    <a class="auth-back-link" href="/index.html" aria-label="Zurück zur Startseite">← Zurück zur Startseite</a>
    <section class="auth-card">
      <p class="kicker">Admin Bereich</p>
      <h1>KI News Dashboard Login</h1>
      <p class="auth-subline">Melde dich mit Benutzername und Passwort an, um Statistiken und Nutzer zu verwalten.</p>

      <form id="loginForm" class="auth-form" autocomplete="off">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" required placeholder="admin" />

        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" required placeholder="••••••••" />

        <button type="submit" id="loginBtn">Einloggen</button>
        <p id="loginError" class="form-error" role="alert" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="./login.js"></script>
</body>
</html>
